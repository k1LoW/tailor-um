name: trivy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  job-trivy:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'license'
          severity: 'UNKNOWN,MEDIUM,HIGH'
          exit-code: '1'
